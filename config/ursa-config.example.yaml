# Ursa Configuration Example
# Copy this file to ~/.config/ursa-<deployment>/ursa-config-<deployment>.yaml and customize
#
# Create the directory first:
#   mkdir -p ~/.config/ursa-<deployment>
#   cp config/ursa-config.example.yaml ~/.config/ursa-<deployment>/ursa-config-<deployment>.yaml
#
# This file defines:
# - AWS regions to expose for cluster discovery and execution-plane calls
# - AWS profile, TapDB runtime, peer service URLs, and Cognito settings
# - the deployment-scoped config shape generated by `ursa config init`
#
# NOTE: S3 buckets are discovered from cluster tags (aws-parallelcluster-monitor-bucket)
# rather than being configured here. Each cluster's bucket is set during cluster creation.
#
# AWS profile to use (AWS_PROFILE may still override this)
aws_profile: lsmc

# Session secret generated by `ursa config init`
session_secret_key: generated-on-init

# Email domains allowed to sign in
whitelist_domains: lsmc.com,lsmc.bio,lsmc.life,daylilyinformatics.com

# List of AWS regions to scan for ParallelCluster instances
# Clusters in these regions will be available for workset execution
# Each region can have an optional ssh_pem for region-specific SSH keys
regions:
  - us-west-2:
      ssh_pem: ~/.ssh/<some>-us-west-2.pem
  - us-east-1:
      ssh_pem: ~/.ssh/<some>-us-east-1.pem
  - eu-central-1:
      ssh_pem: ~/.ssh/<some>-eu-central-1.pem


# =============================================================================
# TapDB Runtime
# =============================================================================
# Ursa reads its TapDB namespace/runtime from this YAML file. Python package
# dependencies live in pyproject.toml; TapDB bootstrap remains delegated to the
# tapdb CLI when database lifecycle work is required.
# Bootstrap the matching namespace with:
#   tapdb --config ~/.config/tapdb/local/ursa/tapdb-config.yaml db-config init --client-id ursa --database-name ursa --schema-name tapdb_ursa --owner-repo-name ursa --domain-code Z --domain-registry-path ~/.config/tapdb/domain_code_registry.json --prefix-ownership-registry-path ~/.config/tapdb/prefix_ownership_registry.json --engine-type local --host localhost --port 5541 --ui-port 8916 --user postgres --database ursa
#   tapdb --config ~/.config/tapdb/local/ursa/tapdb-config.yaml bootstrap local
#
# Explicit process contract for TapDB/Meridian subprocesses:
# MERIDIAN_DOMAIN_CODE=Z
# TAPDB_OWNER_REPO=ursa
tapdb_client_id: ursa
tapdb_database_name: ursa
tapdb_schema_name: tapdb_ursa_dev
tapdb_config_path: ~/.config/tapdb/local/ursa-<deployment>/tapdb-config.yaml
tapdb_domain_code: Z
tapdb_owner_repo_name: ursa
tapdb_domain_registry_path: ~/.config/tapdb/domain_code_registry.json
tapdb_prefix_ownership_registry_path: ~/.config/tapdb/prefix_ownership_registry.json

# Required runtime storage bucket
ursa_internal_output_bucket: your-ursa-output-bucket

# API/UI bind settings
api_host: 0.0.0.0
api_port: 8913

# Peer service URLs
bloom_base_url: https://localhost:8912
bloom_verify_ssl: true
atlas_base_url: https://localhost:8915
atlas_verify_ssl: true
dewey_enabled: false
dewey_base_url: ""
dewey_api_token: ""
dewey_verify_ssl: true

# OWY-triggered run-directory analysis policy. These must be explicit before
# POST /api/v1/dewey/run-directory-analysis-triggers can launch jobs.
ursa_run_directory_analysis_tenant_id: ""
ursa_run_directory_analysis_owner_user_id: ""
ursa_run_directory_analysis_region: ""
ursa_run_directory_analysis_reference_s3_uri: ""
ursa_run_directory_analysis_stage_target: ""
ursa_run_directory_analysis_destination_s3_uri: ""
ursa_run_directory_analysis_project: ""
ursa_run_directory_analysis_aws_profile: ""
ursa_run_directory_analysis_dewey_token_env: ""
ursa_run_directory_analysis_cluster_create_name: ""
ursa_run_directory_analysis_cluster_create_region_az: ""
ursa_run_directory_analysis_cluster_create_config_path: ""
ursa_run_directory_analysis_cluster_create_timeout_seconds: 3600
ursa_run_directory_analysis_cluster_create_poll_interval_seconds: 30

# Admin-controlled idle cluster cleanup defaults. Cleanup is disabled by default.
# When enabled, Ursa exports FSx analysis output to S3 before any delete.
ursa_cluster_auto_cleanup_enabled: false
ursa_cluster_auto_cleanup_idle_minutes: 45
ursa_cluster_auto_cleanup_export_source_path: /fsx/analysis_results/ubuntu
ursa_cluster_auto_cleanup_export_destination_s3_uri: ""
ursa_cluster_auto_cleanup_export_output_dir: ""

# Cognito configuration is read from this YAML file.
# cognito_user_pool_id: us-west-2_xxxxxxxx
# cognito_app_client_id: xxxxxxxxxxxxxxxxxxxxxxxxxx
# cognito_region: us-west-2  # AWS region where Cognito User Pool is deployed
# cognito_domain: your-domain-prefix.auth.us-west-2.amazoncognito.com
# cognito_callback_url: https://localhost:8913/auth/callback
# cognito_logout_url: https://localhost:8913/login

# Non-production deployment chrome
deployment:
  name: "<deployment>"
  color: ""
  is_production: false

# Show deployment and region bars across every GUI page unless explicitly disabled
ui_show_environment_chrome: true

# Mounted TapDB admin surface. Disable this when the active environment does not
# install the TapDB admin app.
ursa_tapdb_mount_enabled: true
ursa_tapdb_mount_path: /admin/tapdb
